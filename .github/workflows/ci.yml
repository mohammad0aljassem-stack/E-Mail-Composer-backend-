name: CI

# Transport worker CI. NOT a scheduler/runtime — this only builds and tests.
# Least privilege: read-only checkout token; no deploy steps; no secrets used.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22.22.2"
  PNPM_VERSION: "10.33.0"
  # The canonical schema is owned by the sibling UI repo at this merged SHA
  # (Workstream A: baseline + 5 migrations). Full 40-char SHA: actions/checkout
  # cannot fetch an abbreviated ref.
  UI_REPO_REF: "422485af44fa4606a7c0dbee798a9866b3fd0d8e"
  # All THREE Phase 3 migration checksums are pinned and verified fail-closed.
  EXPECTED_FOUNDATION_SHA: "a2319ada8d471d09063b8e2bfbdb8c814e4ba49cecdee08c9bbd9b800aa8c72a"
  EXPECTED_HARDENING_SHA: "ee064f0b50d01897b8247a10edefc95bd0088862e3731693b19da7c851253977"
  EXPECTED_GRANT_SHA: "ca15b9de01894ef784fad57f991a052e2da1fcdca435cc1a78463af34b3c0dba"

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Checkout canonical schema (sibling UI repo, pinned SHA)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/E-Mail-Composer-UI
          ref: ${{ env.UI_REPO_REF }}
          path: ui-schema
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install PostgreSQL 16 server binaries
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-16

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Coverage (thresholds enforced)
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Prod dependency audit (high)
        run: pnpm audit --prod --audit-level high

      - name: License policy check (no AGPL / non-permissive)
        run: pnpm run license:check

      - name: Verify canonical UI SHA + all three Phase 3 checksums (fail closed)
        run: |
          set -euo pipefail
          # The checked-out UI schema MUST be the pinned canonical SHA.
          actual_sha="$(git -C ui-schema rev-parse HEAD)"
          if [ "$actual_sha" != "$UI_REPO_REF" ]; then
            echo "UI schema SHA mismatch: $actual_sha != $UI_REPO_REF"; exit 1
          fi
          verify() {
            local file="$1" expected="$2"
            if [ ! -f "$file" ]; then echo "MISSING migration: $file"; exit 1; fi
            local a; a="$(sha256sum "$file" | awk '{print $1}')"
            if [ "$a" != "$expected" ]; then
              echo "Checksum mismatch for $file: $a != $expected"; exit 1
            fi
          }
          M=ui-schema/supabase/migrations
          verify "$M/20260713100000_transport_foundation.sql"        "$EXPECTED_FOUNDATION_SHA"
          verify "$M/20260714100000_transport_contract_hardening.sql" "$EXPECTED_HARDENING_SHA"
          verify "$M/20260715100000_worker_transition_grant.sql"      "$EXPECTED_GRANT_SHA"
          echo "Canonical pin verified: UI $UI_REPO_REF + 3 Phase 3 checksums."

      - name: Start local Postgres + load canonical schema
        run: UI_REPO="$GITHUB_WORKSPACE/ui-schema" bash scripts/test-db.sh --print

      - name: Local Postgres + pg-boss integration
        env:
          TEST_DATABASE_URL: postgresql://postgres@localhost:54330/transport_test
          TEST_WORKER_DATABASE_URL: postgresql://transport_worker:worker_test_pw@localhost:54330/transport_test
        run: pnpm test:integration

      - name: Fake IMAP integration (sync + IDLE, no network)
        run: pnpm vitest run --project unit test/unit/sync-executor.test.ts

      - name: Fake SMTP integration (send path, no network)
        run: pnpm vitest run --project unit test/unit/send-executor.test.ts

      - name: Failure-injection tests (pre-DATA / ambiguous / restart / sender safety)
        run: pnpm vitest run --project unit -t "ambiguous|pre-DATA|restart|failed before|sent_copy_pending|claim|sender|dispatch|stale|dedup"

      - name: Secret scan
        run: pnpm run secret:scan

      - name: git diff --check (whitespace / conflict markers)
        run: git diff --check

      - name: Teardown throwaway Postgres
        if: always()
        run: bash scripts/test-db.sh --stop || true
